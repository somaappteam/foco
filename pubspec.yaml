name: foco
description: FOCO - Visual Exploration Game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Core
  cupertino_icons: ^1.0.2
  
  # State Management
  flutter_riverpod: any
  riverpod_annotation: any
  
  # Storage (Offline First)
  hive: any
  hive_flutter: any
  path_provider: any
  
  # Monetization (Integrated)
  in_app_purchase: any
  in_app_purchase_storekit: any
  
  # Premium Feel
  google_fonts: any
  shimmer: any
  flutter_animate: any
  lottie: any
  
  # Haptics (Critical for "Real" Feel)
  haptic_feedback: any
  vibration: any
  
  # Audio Immersion
  audioplayers: any
  just_audio: any
  
  # Visual Effects
  blur: any
  glass: any
  
  # Backend (Sync)
  
  # Utils
  freezed_annotation: any
  json_annotation: any
  uuid: ^4.5.3
  intl: any
  shared_preferences: any
  go_router: ^17.1.0
  supabase_flutter: any
  crypto: ^3.0.7
  connectivity_plus: any
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.2
  app_links: ^3.5.0
  wakelock_plus: ^1.4.0
  device_info_plus: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/audio/ambient/
    - assets/audio/haptics/
    - assets/images/scenes/
    - assets/lottie/
